spring.application.name=civic-lens-backend
server.port=8080

# PostgreSQL Database Configuration (for production)
spring.datasource.url=jdbc:postgresql://localhost:5432/civic_lens_prod
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=civic_user
spring.datasource.password=secure_123P

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.out-of-order=true
spring.flyway.repair=true

# JWT Configuration
jwt.secret=your-super-secret-jwt-key-change-this-in-production-at-least-32-characters-long
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://civiclens-frontend-tzml.onrender.com,https://civiceye.co.ke,https://www.civiceye.co.ke
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
