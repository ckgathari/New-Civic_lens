spring.application.name=civic-lens-backend
server.port=8080


# PostgreSQL Database Configuration (for development)
spring.datasource.url=jdbc:postgresql://localhost:5432/civic_lens_prod
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=civic_user
spring.datasource.password=secure_123P

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# H2 Console (disabled for PostgreSQL)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Flyway Configuration
spring.flyway.enabled=false

# JWT Configuration
jwt.secret=your-super-secret-jwt-key-change-this-in-production-at-least-32-characters-long
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Debug logging for security
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG